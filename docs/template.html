<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listhammer — Meta Analysis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #21262d;
    --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff; --accent2: #79c0ff;
    --green: #2ecc71; --yellow: #f39c12; --red: #e74c3c;
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* Topbar */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0.8rem 2rem; display: flex; align-items: center; gap: 1.5rem; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
  .topbar h1 { font-size: 1.1rem; color: var(--accent); white-space: nowrap; }
  .faction-badge { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 0.2rem 0.7rem; border-radius: var(--radius); font-size: 0.82rem; }
  .topbar nav { display: flex; gap: 0.4rem; }
  .topbar nav a { color: var(--text2); text-decoration: none; padding: 0.3rem 0.9rem; border-radius: var(--radius); font-size: 0.85rem; transition: background 0.15s; cursor: pointer; }
  .topbar nav a:hover, .topbar nav a.active { background: var(--bg3); color: var(--text); }
  .ts-badge { color: var(--text2); font-size: 0.78rem; margin-left: auto; white-space: nowrap; }

  /* Diff banner */
  .diff-banner { background: var(--bg2); border-left: 3px solid var(--accent); padding: 0.65rem 2rem; font-size: 0.87rem; }
  .diff-banner strong { color: var(--accent2); }
  .diff-prose { margin-top: 0.25rem; color: var(--text2); font-style: italic; font-size: 0.84rem; }

  /* Container + tabs */
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Lists tab */
  .lists-layout { display: grid; grid-template-columns: 1fr 250px; gap: 1.5rem; align-items: start; }
  @media (max-width: 860px) { .lists-layout { grid-template-columns: 1fr; } }

  /* List controls */
  .list-controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .ctrl-label { color: var(--text2); font-size: 0.8rem; }
  .sort-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 0.22rem 0.7rem; border-radius: var(--radius); font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
  .sort-btn:hover { background: var(--bg3); color: var(--text); }
  .sort-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  #det-filter { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 0.22rem 0.5rem; border-radius: var(--radius); font-size: 0.8rem; }

  /* List cards */
  .list-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin: 0.4rem 0; }
  .list-card-header { padding: 0.65rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; user-select: none; }
  .list-card-header:hover { background: var(--bg3); border-radius: var(--radius) var(--radius) 0 0; }
  .list-card.expanded .list-card-header { border-radius: var(--radius) var(--radius) 0 0; }
  .list-card-body { display: none; padding: 1rem; border-top: 1px solid var(--border); }
  .list-card.expanded .list-card-body { display: block; }
  .det-pill { font-size: 0.75rem; background: var(--bg3); border: 1px solid var(--border); padding: 0.1rem 0.5rem; border-radius: 10px; color: var(--text2); white-space: nowrap; }
  .player-name { font-weight: 600; font-size: 0.88rem; }
  .novelty-badge { background: var(--green); color: #000; font-size: 0.68rem; font-weight: 700; padding: 0.1rem 0.45rem; border-radius: 10px; white-space: nowrap; }
  .card-event { color: var(--text2); font-size: 0.78rem; margin-left: auto; }
  .record-badge { font-size: 0.76rem; color: var(--accent2); font-family: monospace; }
  .compare-cb { cursor: pointer; flex-shrink: 0; }

  /* Card body */
  .ai-char-box { background: var(--bg3); border-left: 3px solid var(--accent); padding: 0.55rem 0.8rem; margin-bottom: 0.75rem; border-radius: 0 var(--radius) var(--radius) 0; }
  .ai-archetype { font-weight: 700; color: var(--accent2); font-size: 0.82rem; display: block; margin-bottom: 0.15rem; }
  .ai-gameplan { font-size: 0.83rem; color: var(--text2); margin: 0; }
  .ai-tag { display: inline-block; font-size: 0.68rem; font-weight: 600; padding: 0.08rem 0.4rem; border-radius: 3px; background: var(--bg); border: 1px solid var(--border); color: var(--accent2); text-transform: uppercase; letter-spacing: 0.03em; margin-right: 0.3rem; }
  .roster-block { background: var(--bg3); border: 1px solid var(--border); padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.76rem; font-family: 'Courier New', monospace; white-space: pre-wrap; overflow-x: auto; color: var(--text); line-height: 1.55; margin: 0.5rem 0; }
  .card-footer { margin-top: 0.5rem; }
  .det-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
  .det-link:hover { text-decoration: underline; }

  /* Sidebar widget */
  .lists-sidebar { position: sticky; top: 60px; }
  .det-widget { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .det-widget h3 { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .det-bars { display: flex; flex-direction: column; gap: 0.45rem; }
  .det-bar-row { display: flex; align-items: center; gap: 0.45rem; }
  .det-bar-label { width: 110px; min-width: 70px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; font-size: 0.72rem; }
  .det-bar-wrap { flex: 1; background: var(--bg3); border-radius: 3px; height: 9px; overflow: hidden; }
  .det-bar-fill { background: var(--accent); height: 100%; border-radius: 3px; min-width: 4px; }
  .det-bar-count { color: var(--text2); font-size: 0.72rem; min-width: 20px; text-align: right; }

  /* By Detachment tab */
  .det-section { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .det-section:last-child { border-bottom: none; }
  .det-section > h2 { color: var(--accent); font-size: 1.25rem; margin-bottom: 0.75rem; }
  .det-count { color: var(--text2); font-size: 0.88rem; font-weight: 400; }
  .det-summary { color: var(--text); margin-bottom: 1rem; font-size: 0.88rem; line-height: 1.75; }
  .det-section h3 { color: var(--text2); font-size: 0.78rem; margin: 1.1rem 0 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Frequency table */
  .freq-table { width: 100%; border-collapse: collapse; margin: 0.4rem 0 1rem; background: var(--bg2); border-radius: var(--radius); overflow: hidden; font-size: 0.83rem; }
  .freq-table th, .freq-table td { padding: 0.38rem 0.7rem; text-align: left; border-bottom: 1px solid var(--border); }
  .freq-table th { background: var(--bg3); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.04em; }
  .freq-table tr:last-child td { border-bottom: none; }
  .freq-table tr:hover { background: var(--bg3); }
  .freq-table .num { text-align: right; font-variant-numeric: tabular-nums; }

  /* Variance & novelty sections */
  .variance-section { background: var(--bg2); border-left: 3px solid var(--yellow); padding: 0.65rem 1rem; margin: 0.5rem 0 1rem; border-radius: 0 var(--radius) var(--radius) 0; }
  .variance-section h3 { margin: 0 0 0.35rem; color: var(--yellow); font-size: 0.78rem; }
  .variance-note { color: var(--text2); font-weight: 400; }
  .variance-section ul { list-style: none; font-size: 0.82rem; }
  .variance-section li { padding: 0.1rem 0; }
  .novelty-section { background: var(--bg2); border-left: 3px solid var(--green); padding: 0.65rem 1rem; margin: 0.5rem 0 1rem; border-radius: 0 var(--radius) var(--radius) 0; }
  .novelty-section h3 { margin: 0 0 0.35rem; color: var(--green); font-size: 0.78rem; display: flex; align-items: center; gap: 0.4rem; }
  .novelty-section ul { list-style: none; font-size: 0.82rem; }
  .novelty-section li { padding: 0.1rem 0; }

  /* Unit keyword badges */
  .kw-badge { display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 0.05rem 0.35rem; border-radius: 3px; margin-left: 0.3rem; vertical-align: middle; text-transform: uppercase; letter-spacing: 0.03em; }
  .kw-character { background: #2d333b; color: #d2a8ff; border: 1px solid #3b3050; }
  .kw-infantry { background: #2d333b; color: #79c0ff; border: 1px solid #1f3a5f; }
  .kw-monster { background: #2d333b; color: #f97583; border: 1px solid #5f1f2d; }
  .kw-vehicle { background: #2d333b; color: #f0c674; border: 1px solid #5f4a1f; }
  .kw-terminator { background: #2d333b; color: #85e89d; border: 1px solid #1f5f2d; }
  .kw-fly { background: #2d333b; color: #b392f0; border: 1px solid #3b2d5f; }
  .kw-daemon { background: #2d333b; color: #ffab70; border: 1px solid #5f3a1f; }
  .kw-psyker { background: #2d333b; color: #79e8e8; border: 1px solid #1f4f5f; }
  .kw-other { background: #2d333b; color: var(--text2); border: 1px solid var(--border); }

  /* List anatomy */
  .anatomy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.5rem; margin: 0.5rem 0 0.75rem; }
  .anatomy-group { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.7rem; }
  .anatomy-group-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text2); font-weight: 600; margin-bottom: 0.3rem; }
  .anatomy-unit { font-size: 0.78rem; padding: 0.15rem 0; display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
  .anatomy-unit-name { color: var(--text); }
  .anatomy-pts { color: var(--text2); font-size: 0.72rem; font-family: monospace; }
  .freq-tag { font-size: 0.58rem; font-weight: 700; padding: 0.05rem 0.3rem; border-radius: 3px; white-space: nowrap; }
  .freq-core { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
  .freq-contested { background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); }
  .freq-tech { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }

  /* Detachment rules panel */
  .det-rules-panel { margin: 0.8rem 0 1.2rem; }
  .det-rules-panel summary { cursor: pointer; color: var(--accent); font-size: 0.82rem; font-weight: 600; padding: 0.4rem 0; }
  .det-rules-panel summary:hover { color: var(--accent2); }
  .det-rules-panel[open] summary { margin-bottom: 0.5rem; }
  .det-ability-box { background: var(--bg2); border-left: 3px solid var(--accent); padding: 0.55rem 0.8rem; margin-bottom: 0.75rem; border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.83rem; color: var(--text2); line-height: 1.6; }
  .det-ability-box strong { color: var(--text); }
  .strat-table { width: 100%; border-collapse: collapse; margin: 0.4rem 0 0.8rem; background: var(--bg2); border-radius: var(--radius); overflow: hidden; font-size: 0.8rem; }
  .strat-table th, .strat-table td { padding: 0.35rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
  .strat-table th { background: var(--bg3); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.04em; }
  .strat-table tr:last-child td { border-bottom: none; }
  .strat-table tr:hover { background: var(--bg3); }
  .strat-cp { color: var(--accent2); font-weight: 700; font-family: monospace; white-space: nowrap; }
  .strat-type { color: var(--text2); font-size: 0.75rem; }
  .enh-pts { color: var(--accent2); font-weight: 600; font-family: monospace; }

  /* Build Advisor tab */
  .advisor-controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .advisor-controls label { color: var(--text2); font-size: 0.82rem; font-weight: 600; }
  .advisor-controls select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 0.35rem 0.7rem; border-radius: var(--radius); font-size: 0.85rem; }
  .advisor-tier { margin-bottom: 1.5rem; }
  .advisor-tier > h3 { font-size: 0.9rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .tier-badge { font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 3px; }
  .tier-core { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
  .tier-strong { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
  .tier-tech { background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); }
  .tier-unseen { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid rgba(139,148,158,0.3); }
  .advisor-unit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.55rem 0.8rem; margin: 0.35rem 0; display: flex; align-items: flex-start; gap: 0.7rem; flex-wrap: wrap; }
  .advisor-unit-name { font-weight: 600; font-size: 0.85rem; color: var(--text); }
  .advisor-unit-meta { font-size: 0.78rem; color: var(--text2); }
  .advisor-unit-strats { font-size: 0.75rem; color: var(--text2); margin-top: 0.2rem; }
  .advisor-unit-strats strong { color: var(--accent2); font-weight: 600; }
  .advisor-det-ability { background: var(--bg2); border-left: 3px solid var(--accent); padding: 0.55rem 0.8rem; margin-bottom: 1rem; border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.83rem; color: var(--text2); line-height: 1.6; }
  .advisor-det-ability strong { color: var(--text); }
  .advisor-empty { color: var(--text2); font-size: 0.85rem; font-style: italic; padding: 0.5rem 0; }
  .advisor-ai-summary { background: var(--bg2); border-left: 3px solid var(--accent); padding: 0.55rem 0.8rem; margin-bottom: 1.2rem; border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.85rem; color: var(--text); line-height: 1.7; }
  .advisor-ai-summary strong { color: var(--accent2); }

  /* Patterns tab */
  .prose-block { font-size: 0.88rem; line-height: 1.8; color: var(--text); background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; }
  .container section { margin-bottom: 2rem; }
  .container section > h2 { color: var(--accent); font-size: 1.25rem; margin-bottom: 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }

  /* Comparison modal */
  .comparison-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.72); }
  .modal-body { position: relative; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); width: 90vw; max-width: 1100px; max-height: 85vh; overflow-y: auto; padding: 1.5rem; }
  .modal-close { position: absolute; top: 0.8rem; right: 1rem; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 0.28rem 0.8rem; border-radius: var(--radius); cursor: pointer; font-size: 0.83rem; }
  .modal-close:hover { background: var(--border); color: var(--text); }
  .comparison-content { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
  @media (max-width: 700px) { .comparison-content { grid-template-columns: 1fr; } }
  .compare-col h3 { color: var(--accent2); margin-bottom: 0.25rem; font-size: 0.95rem; }
  .compare-meta { color: var(--text2); font-size: 0.8rem; margin-bottom: 0.6rem; }

  /* Misc */
  .notice { color: var(--text2); font-size: 0.9rem; padding: 3rem; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <h1>&#9876; Listhammer</h1>
  <span class="faction-badge" id="faction-badge">Loading&hellip;</span>
  <nav role="tablist">
    <a role="tab" aria-selected="true" class="active" onclick="switchTab('lists',this)">Lists</a>
    <a role="tab" aria-selected="false" onclick="switchTab('by-detachment',this)">By Detachment</a>
    <a role="tab" aria-selected="false" onclick="switchTab('patterns',this)">Patterns</a>
    <a role="tab" aria-selected="false" onclick="switchTab('advisor',this)">Build Advisor</a>
  </nav>
  <span class="ts-badge" id="ts-badge"></span>
</div>

<div id="diff-banner" class="diff-banner" style="display:none"></div>

<div class="container">
  <div id="tab-lists" class="tab-content active" role="tabpanel">
    <div class="lists-layout">
      <div class="lists-main">
        <div class="list-controls" id="list-controls"></div>
        <div id="list-cards"><p class="notice">Loading&hellip;</p></div>
      </div>
      <aside class="lists-sidebar">
        <div id="det-widget" class="det-widget" style="display:none"></div>
      </aside>
    </div>
  </div>

  <div id="tab-by-detachment" class="tab-content" role="tabpanel">
    <div id="det-sections"><p class="notice">Loading&hellip;</p></div>
  </div>

  <div id="tab-patterns" class="tab-content" role="tabpanel">
    <div id="patterns-content"><p class="notice">Loading&hellip;</p></div>
  </div>

  <div id="tab-advisor" class="tab-content" role="tabpanel">
    <div id="advisor-content"><p class="notice">Loading&hellip;</p></div>
  </div>
</div>

<div id="comparison-modal" class="comparison-modal" style="display:none" role="dialog" aria-modal="true" aria-label="List Comparison">
  <div class="modal-overlay" onclick="closeComparison()"></div>
  <div class="modal-body">
    <button class="modal-close" onclick="closeComparison()" aria-label="Close comparison">&#10005; Close</button>
    <div id="comparison-content" class="comparison-content"></div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------------------
  // Data — inlined at build time by build-site.js
  // ---------------------------------------------------------------------------
  var INLINE_META  = /*__META_REPORT_DATA__*/null;
  var INLINE_OPT   = /*__OPTIMIZER_DATA__*/null;
  var INLINE_AI    = /*__AI_ANALYSIS_DATA__*/null;
  var INLINE_LISTS = /*__LISTS_DATA__*/null;
  var INLINE_RULES    = /*__RULES_DATA__*/null;
  var INLINE_ENRICHED = /*__ENRICHED_DATA__*/null;

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  var _allLists    = [];
  var _listMap     = {};   // listId -> list object
  var _selected    = [];   // up to 2 listIds for comparison
  var _sortMode    = 'newest';
  var _filterDet   = '';
  var _meta        = null;
  var _ai          = null;
  var _advisorData = null;

  // ---------------------------------------------------------------------------
  // Tab switching
  // ---------------------------------------------------------------------------
  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.topbar nav a').forEach(function(a) { a.classList.remove('active'); a.setAttribute('aria-selected', 'false'); });
    var tab = document.getElementById('tab-' + name);
    if (tab) tab.classList.add('active');
    if (el) { el.classList.add('active'); el.setAttribute('aria-selected', 'true'); }
  }

  // ---------------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------------
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function makeListId(l) {
    return (l.playerName || l.player || '') + '|' + (l.event || '') + '|' + (l.date || '');
  }

  function findAiChar(ai, listId) {
    if (!ai || !ai.listCharacterizations) return null;
    for (var i = 0; i < ai.listCharacterizations.length; i++) {
      if (ai.listCharacterizations[i].listId === listId) return ai.listCharacterizations[i];
    }
    return null;
  }

  function flattenFromLists(listsData) {
    if (!listsData || !listsData.sections) return [];
    var seen = {};
    var result = [];
    var skeys = Object.keys(listsData.sections);
    // Put "All" first if present
    if (skeys.indexOf('All') !== -1) {
      skeys = ['All'].concat(skeys.filter(function(k) { return k !== 'All'; }));
    }
    skeys.forEach(function(key) {
      (listsData.sections[key] || []).forEach(function(item) {
        var id = makeListId(item);
        if (!seen[id]) { seen[id] = true; result.push(item); }
      });
    });
    return result;
  }

  // ---------------------------------------------------------------------------
  // Unit keyword lookup
  // ---------------------------------------------------------------------------
  var _kwShowList = ['CHARACTER','INFANTRY','MONSTER','VEHICLE','TERMINATOR','FLY','DAEMON','PSYKER','BEAST','BATTLELINE','EPIC HERO','FORTIFICATION'];
  var _kwClassMap = { CHARACTER:'kw-character', INFANTRY:'kw-infantry', MONSTER:'kw-monster', VEHICLE:'kw-vehicle', TERMINATOR:'kw-terminator', FLY:'kw-fly', DAEMON:'kw-daemon', PSYKER:'kw-psyker' };

  function buildKeywordLookup(rules) {
    var map = {}; // lowercase unit name -> keyword[]
    if (!rules || !rules.units) return map;
    rules.units.forEach(function(u) {
      if (u.name && u.keywords && u.keywords.length > 0) {
        map[u.name.toLowerCase()] = u.keywords.filter(function(k) { return _kwShowList.indexOf(k) !== -1; });
      }
    });
    return map;
  }

  function kwBadgesHTML(unitName, kwMap) {
    var kws = kwMap[unitName.toLowerCase()];
    if (!kws || kws.length === 0) return '';
    var html = '';
    kws.forEach(function(k) {
      var cls = _kwClassMap[k] || 'kw-other';
      html += '<span class="kw-badge ' + cls + '">' + esc(k) + '</span>';

  // ---------------------------------------------------------------------------
  // Detachment rules parser — FALLBACK only.
  // Mirrors enrich-rules.js:parseDetachments(). Prefer _enriched.detachments
  // when available. Keep in sync if the backend parser changes.
  // ---------------------------------------------------------------------------
  function parseDetachmentRules(rules) {
    if (!rules || !rules.factionAbilities) return {};
    var fa = rules.factionAbilities;
    var detMap = {}; // lowercase detachment name -> { ability, stratagems[], enhancements[] }
    var i = 0;
    while (i < fa.length) {
      var entry = fa[i];
      // Skip known non-detachment entries
      if (['NURGLE\'S GIFT (AURA)', 'PACT OF DECAY', 'SPAWNDOM', 'A GRAND PLAGUE',
           'ALCHEMICAL PATHOGENS', 'BATTLE TRAITS', 'AGENDAS', 'REQUISITIONS',
           'CRUSADE RELICS', 'ARTIFICER RELICS', 'ANTIQUITY RELICS', 'LEGENDARY RELICS',
           'CRUSADE BADGES', 'PLAGUE CHAMPION', 'CHOSEN OF NURGLE', 'DISEASED DAEMON LORD',
           'BOARDING ACTIONS', 'INTRODUCTION', 'FORMING BOARDING SQUADS',
           'PRIVACY PREFERENCES'].indexOf(entry.name) !== -1) {
        i++; continue;
      }
      // Look for pattern: ability -> ENHANCEMENTS -> STRATAGEMS
      if (entry.name !== 'ENHANCEMENTS' && entry.name !== 'STRATAGEMS' &&
          entry.name !== 'DETACHMENT RULE' && entry.name !== 'RULES ADAPTATIONS') {
        var abilityName = entry.name;
        var abilityDesc = entry.description;
        var enhancements = [];
        var stratagems = [];
        var detName = null;
        // Scan ahead for ENHANCEMENTS and STRATAGEMS
        var j = i + 1;
        while (j < fa.length && j <= i + 4) {
          if (fa[j].name === 'ENHANCEMENTS') {
            var enhText = fa[j].description;
            var enhMatch = enhText.match(/^(.+)\n(\d+)\s*pts/);
            if (enhMatch) enhancements.push({ name: enhMatch[1].trim(), pts: enhMatch[2] });
          } else if (fa[j].name === 'STRATAGEMS') {
            var stratParts = fa[j].description.split(/\n(?=[A-Z][A-Z '\u2019-]+\n\d+CP\n)/);
            for (var s = 0; s < stratParts.length; s++) {
              var lines = stratParts[s].trim().split('\n');
              if (lines.length >= 3) {
                var sName = lines[0].trim();
                var sCp = lines[1].trim();
                var sTypeLine = lines[2].trim();
                var typeMatch = sTypeLine.match(/^(.+?)\s+[\u2013\u2014]\s+(.+)$/);
                if (typeMatch && !detName) detName = typeMatch[1].trim();
                var sType = typeMatch ? typeMatch[2].replace(/\s*STRATAGEM$/i, '').trim() : '';
                stratagems.push({ name: sName, cp: sCp, type: sType });
              }
            }
            j++; break;
          } else if (fa[j].name !== 'DETACHMENT RULE' && fa[j].name !== abilityName) {
            break; // Hit a different detachment ability
          }
          j++;
        }
        if (detName && stratagems.length > 0) {
          detMap[detName.toLowerCase()] = {
            abilityName: abilityName,
            abilityDesc: abilityDesc,
            enhancements: enhancements,
            stratagems: stratagems
          };
        }
        i = j; continue;
      }
      i++;
    }
    return detMap;
  }

  // ---------------------------------------------------------------------------

  function renderDetWidget(lists) {

      html += '<div class="det-bar-row">' +
        '<span class="det-bar-label" title="' + esc(pair[0]) + '">' + esc(pair[0]) + '</span>' +

        '<span class="det-bar-count">' + pair[1] + '</span>' +

  // ---------------------------------------------------------------------------
  // Client-side army list parser + anatomy builder
  // ---------------------------------------------------------------------------
  // Mirror of UNIT_REGEX in utils.js — keep in sync when updating.
  var _unitRegex = /^[•·\-\s]*(.+?)\s*[\[(]\s*(\d+)\s*pts?\s*[\])]/gim;

  function parseListUnits(text) {
    if (!text) return [];
    _unitRegex.lastIndex = 0;
    var units = [];
    var m;
    while ((m = _unitRegex.exec(text)) !== null) {
      var name = m[1].trim().replace(/^[x×]\d+\s+/i, '').replace(/\s*[-–:]\s*$/, '');
      var pts = parseInt(m[2], 10);
      if (name && pts > 0 && name.length < 80) units.push({ name: name, points: pts });
    }
    return units;
  }

  function classifyRole(keywords) {
    if (!keywords || keywords.length === 0) return 'Other';
    if (keywords.indexOf('CHARACTER') !== -1) return 'Characters';
    if (keywords.indexOf('VEHICLE') !== -1) return 'Vehicles';
    if (keywords.indexOf('MONSTER') !== -1) return 'Monsters';
    if (keywords.indexOf('BEAST') !== -1) return 'Other';
    if (keywords.indexOf('FORTIFICATION') !== -1) return 'Fortifications';
    return 'Infantry';
  }

  function getFreqTag(unitName, det, opt) {
    if (!opt || !opt.detachmentFrequencyAnalysis) return null;
    var df = opt.detachmentFrequencyAnalysis;
    var detData = null;
    for (var i = 0; i < df.length; i++) {
      if (df[i].detachment === det) { detData = df[i]; break; }
    }
    if (!detData || !detData.topUnits) return null;
    var lname = unitName.toLowerCase();
    for (var j = 0; j < detData.topUnits.length; j++) {
      if (detData.topUnits[j].name.toLowerCase() === lname) {
        var freq = detData.topUnits[j].frequency;
        if (freq >= 60) return { label: 'CORE', cls: 'freq-core' };
        if (freq >= 20) return { label: 'FLEX', cls: 'freq-contested' };
        return { label: 'TECH', cls: 'freq-tech' };
      }
    }
    return null;
  }

  function buildAnatomyHTML(text, det, kwMap, opt) {
    var units = parseListUnits(text);
    if (units.length === 0) return '';

    // Group by role
    var groups = {};
    var roleOrder = ['Characters', 'Infantry', 'Vehicles', 'Monsters', 'Fortifications', 'Other'];
    units.forEach(function(u) {
      var kws = kwMap[u.name.toLowerCase()] || [];
      var role = classifyRole(kws);
      if (!groups[role]) groups[role] = [];
      groups[role].push({ name: u.name, points: u.points, kws: kws });
    });

    var html = '<div class="anatomy-grid">';
    roleOrder.forEach(function(role) {
      if (!groups[role] || groups[role].length === 0) return;
      html += '<div class="anatomy-group"><div class="anatomy-group-title">' + esc(role) + '</div>';
      groups[role].forEach(function(u) {
        var freqTag = getFreqTag(u.name, det, opt);
        html += '<div class="anatomy-unit">' +
          '<span class="anatomy-unit-name">' + esc(u.name) + '</span>' +
          '<span class="anatomy-pts">' + u.points + 'pts</span>';
        if (freqTag) html += '<span class="freq-tag ' + freqTag.cls + '">' + freqTag.label + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function buildStratagemRelevance(text, det, kwMap) {
    // Get detachment rules — try enriched first, then parsed rules
    var detRules = null;
    if (_enriched && _enriched.detachments) {
      for (var i = 0; i < _enriched.detachments.length; i++) {
        if (_enriched.detachments[i].name.toLowerCase() === det.toLowerCase()) {
          detRules = _enriched.detachments[i];
          break;
        }
      }
    }
    if (!detRules && _rules) {
      var parsed = parseDetachmentRules(_rules);
      var p = parsed[det.toLowerCase()];
      if (p) {
        detRules = {
          stratagems: p.stratagems.map(function(s) { return { name: s.name, cp: s.cp, type: s.type, target: null, targetKeywords: [] }; }),
        };
      }
    }
    if (!detRules || !detRules.stratagems || detRules.stratagems.length === 0) return '';

    // Collect all keywords present in this list's units
    var units = parseListUnits(text);
    if (units.length === 0) return '';
    var listKws = {};
    units.forEach(function(u) {
      var kws = kwMap[u.name.toLowerCase()] || [];
      kws.forEach(function(k) { listKws[k] = true; });
    });

    // Find stratagems whose target keywords overlap with list keywords
    var targeted = [];
    var generic = [];
    detRules.stratagems.forEach(function(s) {
      var tks = s.targetKeywords || [];
      if (tks.length === 0) {
        generic.push(s);
      } else {
        for (var k = 0; k < tks.length; k++) {
          if (listKws[tks[k]]) { targeted.push(s); return; }
        }
      }
    });

    // Only show if there's meaningful filtering (not all stratagems match)
    var relevant = targeted.concat(generic);
    if (relevant.length === 0 || relevant.length === detRules.stratagems.length) return '';

    var html = '<div style="margin:0.5rem 0"><span style="color:var(--accent2);font-size:0.75rem;font-weight:600">KEY STRATAGEMS:</span> ';
    html += '<span style="font-size:0.78rem;color:var(--text2)">';
    html += targeted.map(function(s) {
      return '<span style="color:var(--text)">' + esc(s.name) + '</span> <span style="color:var(--accent2);font-family:monospace;font-size:0.72rem">' + esc(s.cp) + '</span>';
    }).join(' &middot; ');
    html += '</span></div>';
    return html;
  }

  // ---------------------------------------------------------------------------
  // List card builder
  // ---------------------------------------------------------------------------
  function buildListCard(l, ai) {
    var listId = makeListId(l);
    var aiChar = findAiChar(ai, listId);
    var isNew = l.firstSeen && l.lastSeen && l.firstSeen === l.lastSeen;
    var det = l.detachment || 'Unknown';
    var safeId = esc(listId);

    var header = '<div class="list-card-header" onclick="toggleCard(this.parentElement)">' +
      '<input type="checkbox" class="compare-cb" data-listid="' + safeId + '" onclick="event.stopPropagation();handleCompare(this)" title="Compare this list">' +
      '<span class="det-pill">' + esc(det) + '</span>' +
      '<span class="player-name">' + esc(l.playerName || l.player || 'Unknown') + '</span>' +
      (isNew ? '<span class="novelty-badge">NEW</span>' : '') +
      '<span class="card-event">' + esc(l.event || '') + (l.date ? ' &middot; ' + esc(l.date) : '') + '</span>' +
      (l.record ? '<span class="record-badge">' + esc(l.record) + '</span>' : '') +
      '</div>';

    var body = '';
    if (aiChar) {
      body += '<div class="ai-char-box">' +
        '<span class="ai-archetype">' + esc(aiChar.archetype || '') + '</span>' +
        (aiChar.gamePlan ? '<p class="ai-gameplan">' + esc(aiChar.gamePlan) + '</p>' : '');
      var tags = [];
      if (aiChar.primaryThreat) tags.push('<span class="ai-tag">' + esc(aiChar.primaryThreat) + '</span>');
      if (aiChar.boardControl) tags.push('<span class="ai-tag">' + esc(aiChar.boardControl) + '</span>');
      if (tags.length > 0) body += '<div style="margin-top:0.25rem">' + tags.join(' ') + '</div>';
      if (aiChar.keyRulesInteraction) body += '<p style="font-size:0.78rem;color:var(--text2);margin-top:0.2rem"><strong style="color:var(--accent2)">Key Rule:</strong> ' + esc(aiChar.keyRulesInteraction) + '</p>';
      body += '</div>';
    }
    if (l.armyListText) {
      var kwMap = _rules ? buildKeywordLookup(_rules) : {};
      var anatomy = buildAnatomyHTML(l.armyListText, det, kwMap, INLINE_OPT || null);
      if (anatomy) body += anatomy;

      // Stratagem relevance
      body += buildStratagemRelevance(l.armyListText, det, kwMap);

      body += '<details style="margin-top:0.5rem"><summary style="cursor:pointer;color:var(--text2);font-size:0.78rem">Full roster text</summary>' +
        '<pre class="roster-block">' + esc(l.armyListText) + '</pre></details>';
    } else {
      body += '<p style="color:var(--text2);font-size:0.83rem">(No list text available)</p>';
    }
    body += '<div class="card-footer">' +
      '<a class="det-link" href="#" data-detachment="' + esc(det) + '" onclick="goToDetachment(this.dataset.detachment);return false;">' +
      'See all ' + esc(det) + ' lists &rarr;</a></div>';

    return '<div class="list-card" data-listid="' + safeId + '">' +
      header +
      '<div class="list-card-body">' + body + '</div>' +
      '</div>';
  }

  function toggleCard(card) { card.classList.toggle('expanded'); }

  // ---------------------------------------------------------------------------
  // Lists tab render
  // ---------------------------------------------------------------------------
  function renderLists(lists, meta, ai) {
    _allLists = lists;
    lists.forEach(function(l) { _listMap[makeListId(l)] = l; });

    // Build detachment options
    var dets = [];
    lists.forEach(function(l) {
      var d = l.detachment || 'Unknown';
      if (dets.indexOf(d) === -1) dets.push(d);
    });
    dets.sort();

    var controls = document.getElementById('list-controls');
    controls.innerHTML =
      '<span class="ctrl-label">Sort:</span>' +
      '<button class="sort-btn active" onclick="setSort(\'newest\',this)">Newest first</button>' +
      '<button class="sort-btn" onclick="setSort(\'event-size\',this)">Event size</button>' +
      '&nbsp;&nbsp;<span class="ctrl-label">Detachment:</span>' +
      '<select id="det-filter" onchange="setFilter(this.value)">' +
      '<option value="">All</option>' +
      dets.map(function(d) { return '<option value="' + esc(d) + '">' + esc(d) + '</option>'; }).join('') +
      '</select>';

    renderDetWidget(lists);
    redrawCards();
  }

  function setSort(mode, btn) {
    _sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    redrawCards();
  }

  function setFilter(val) {
    _filterDet = val;
    redrawCards();
  }

  function goToDetachment(det) {
    _filterDet = det;
    var sel = document.getElementById('det-filter');
    if (sel) sel.value = det;
    redrawCards();
    // Switch to lists tab
    document.querySelectorAll('.topbar nav a').forEach(function(a) {
      if (a.textContent.trim() === 'Lists') switchTab('lists', a);
    });
  }

  function redrawCards() {
    var filtered = _filterDet
      ? _allLists.filter(function(l) { return (l.detachment || 'Unknown') === _filterDet; })
      : _allLists;

    var sorted = filtered.slice();
    if (_sortMode === 'newest') {
      sorted.sort(function(a, b) {
        var da = a.date || '', db = b.date || '';
        return db < da ? -1 : db > da ? 1 : 0;
      });
    } else if (_sortMode === 'event-size') {
      var sizeMap = {};
      if (_meta && _meta.eventBreakdown) {
        _meta.eventBreakdown.forEach(function(e) { sizeMap[e.event] = e.listCount; });
      }
      sorted.sort(function(a, b) { return (sizeMap[b.event] || 0) - (sizeMap[a.event] || 0); });
    }

    var html = sorted.length === 0
      ? '<p class="notice">No lists found.</p>'
      : sorted.map(function(l) { return buildListCard(l, _ai); }).join('');
    document.getElementById('list-cards').innerHTML = html;
    _selected = [];
  }

  // ---------------------------------------------------------------------------
  // Comparison
  // ---------------------------------------------------------------------------
  function handleCompare(cb) {
    var listId = cb.dataset.listid;
    if (cb.checked) {
      if (_selected.length >= 2) { cb.checked = false; return; }
      _selected.push(listId);
    } else {
      _selected = _selected.filter(function(id) { return id !== listId; });
    }
    if (_selected.length === 2) showComparison();
  }

  function showComparison() {
    var a = _listMap[_selected[0]];
    var b = _listMap[_selected[1]];
    if (!a || !b) return;

    var kwMap = buildKeywordLookup(_rules);
    var unitsA = parseListUnits(a.armyListText);
    var unitsB = parseListUnits(b.armyListText);
    var namesA = {};
    var namesB = {};
    unitsA.forEach(function(u) { namesA[u.name.toLowerCase()] = u; });
    unitsB.forEach(function(u) { namesB[u.name.toLowerCase()] = u; });

    var shared = [], onlyA = [], onlyB = [];
    unitsA.forEach(function(u) {
      if (namesB[u.name.toLowerCase()]) {
        shared.push({ name: u.name, ptsA: u.points, ptsB: namesB[u.name.toLowerCase()].points });
      } else {
        onlyA.push(u);
      }
    });
    unitsB.forEach(function(u) {
      if (!namesA[u.name.toLowerCase()]) onlyB.push(u);
    });

    // AI characterizations
    var aiA = findAiChar(_ai, makeListId(a));
    var aiB = findAiChar(_ai, makeListId(b));

    function headerHTML(l, label) {
      return '<div class="compare-col"><h3>' + esc(l.playerName || l.player || 'Unknown') + '</h3>' +
        '<p class="compare-meta">' + esc(l.detachment || '') + ' &middot; ' + esc(l.event || '') +
        (l.date ? ' &middot; ' + esc(l.date) : '') + (l.record ? ' &middot; ' + esc(l.record) : '') + '</p>';
    }

    function aiHTML(aiChar) {
      if (!aiChar) return '';
      var h = '<div class="ai-char-box" style="margin-top:0.5rem">';
      if (aiChar.archetype) h += '<span class="ai-archetype">' + esc(aiChar.archetype) + '</span>';
      if (aiChar.gamePlan) h += '<p class="ai-gameplan">' + esc(aiChar.gamePlan) + '</p>';
      h += '</div>';
      return h;
    }

    var html = '';

    // Side-by-side AI + header
    html += headerHTML(a) + aiHTML(aiA) + '</div>';
    html += headerHTML(b) + aiHTML(aiB) + '</div>';

    // Diff sections (span both columns)
    html += '<div style="grid-column:1/-1;margin-top:0.5rem">';

    // Shared units
    if (shared.length > 0) {
      html += '<h3 style="color:var(--text2);font-size:0.78rem;text-transform:uppercase;margin-bottom:0.4rem">Shared Units (' + shared.length + ')</h3>';
      html += '<table class="freq-table"><thead><tr><th>Unit</th><th></th><th class="num">Pts (A)</th><th class="num">Pts (B)</th></tr></thead><tbody>';
      shared.forEach(function(u) {
        var diff = u.ptsA !== u.ptsB ? '<span style="color:var(--yellow);font-size:0.72rem">&Delta;</span>' : '';
        html += '<tr><td>' + esc(u.name) + kwBadgesHTML(u.name, kwMap) + '</td><td>' + diff + '</td>' +
          '<td class="num">' + u.ptsA + '</td><td class="num">' + u.ptsB + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Only in A / Only in B side by side
    if (onlyA.length > 0 || onlyB.length > 0) {
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:0.75rem">';

      html += '<div>';
      html += '<h3 style="color:var(--green);font-size:0.78rem;text-transform:uppercase;margin-bottom:0.4rem">Only in ' + esc(a.playerName || a.player || 'List A') + ' (' + onlyA.length + ')</h3>';
      if (onlyA.length > 0) {
        onlyA.forEach(function(u) {
          html += '<div class="advisor-unit-card" style="margin:0.2rem 0"><span class="advisor-unit-name">' + esc(u.name) + '</span>' + kwBadgesHTML(u.name, kwMap) +
            '<span class="advisor-unit-meta" style="margin-left:auto">' + u.points + 'pts</span></div>';
        });
      } else {
        html += '<p class="advisor-empty">None</p>';
      }
      html += '</div>';

      html += '<div>';
      html += '<h3 style="color:var(--green);font-size:0.78rem;text-transform:uppercase;margin-bottom:0.4rem">Only in ' + esc(b.playerName || b.player || 'List B') + ' (' + onlyB.length + ')</h3>';
      if (onlyB.length > 0) {
        onlyB.forEach(function(u) {
          html += '<div class="advisor-unit-card" style="margin:0.2rem 0"><span class="advisor-unit-name">' + esc(u.name) + '</span>' + kwBadgesHTML(u.name, kwMap) +
            '<span class="advisor-unit-meta" style="margin-left:auto">' + u.points + 'pts</span></div>';
        });
      } else {
        html += '<p class="advisor-empty">None</p>';
      }
      html += '</div></div>';
    }

    // Collapsible raw text
    html += '<details style="margin-top:1rem"><summary style="cursor:pointer;color:var(--accent);font-size:0.82rem">Show raw list text</summary>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:0.5rem">';
    html += '<pre class="roster-block">' + esc(a.armyListText || '(no text)') + '</pre>';
    html += '<pre class="roster-block">' + esc(b.armyListText || '(no text)') + '</pre>';
    html += '</div></details>';

    html += '</div>';

    document.getElementById('comparison-content').innerHTML = html;
    document.getElementById('comparison-modal').style.display = 'flex';
  }

  function closeComparison() {
    document.getElementById('comparison-modal').style.display = 'none';
    _selected = [];
    document.querySelectorAll('.compare-cb').forEach(function(cb) { cb.checked = false; });
  }

  // ---------------------------------------------------------------------------
  // By Detachment tab
  // ---------------------------------------------------------------------------
  function renderByDetachment(lists, ai, opt, rules) {
    var el = document.getElementById('det-sections');
    var detFreq = (opt && opt.detachmentFrequencyAnalysis) || [];
    var varAnal = (opt && opt.varianceAnalysis) || [];
    var novelty = (opt && opt.noveltyFlags) || [];
    var aiSums  = (ai  && ai.detachmentSummaries) || [];
    // Prefer enriched detachment data; fall back to parseDetachmentRules()
    var detRulesMap = {};
    if (_enriched && _enriched.detachments) {
      _enriched.detachments.forEach(function(d) {
        detRulesMap[d.name.toLowerCase()] = {
          abilityName: d.abilityName,
          abilityDesc: d.abilityDescription,
          enhancements: d.enhancements,
          stratagems: d.stratagems
        };
      });
    } else if (rules) {
      detRulesMap = parseDetachmentRules(rules);
    }
    var kwMap = buildKeywordLookup(rules);

    // Group by detachment, sorted by count desc
    var byDet = {};
    lists.forEach(function(l) {
      var d = l.detachment || 'Unknown';
      if (!byDet[d]) byDet[d] = [];
      byDet[d].push(l);
    });
    var dets = Object.keys(byDet).sort(function(a, b) { return byDet[b].length - byDet[a].length; });

    if (dets.length === 0) {
      el.innerHTML = '<p class="notice">No detachment data available.</p>';
      return;
    }

    var html = '';
    dets.forEach(function(det) {
      var detLists = byDet[det];
      var aiSum   = aiSums.find(function(s) { return s.detachment === det; });
      var freq    = detFreq.find(function(f) { return f.detachment === det; });
      var vari    = varAnal.find(function(v) { return v.detachment === det; });
      var novFlags = novelty.filter(function(n) { return n.detachment === det; });
      var detRules = detRulesMap[det.toLowerCase()] || null;

      html += '<section class="det-section">';
      html += '<h2>' + esc(det) + ' <span class="det-count">(' + detLists.length + ' list' + (detLists.length !== 1 ? 's' : '') + ')</span></h2>';

      if (aiSum && aiSum.summary) {
        html += '<p class="det-summary">' + esc(aiSum.summary) + '</p>';
        if (aiSum.keyStrength || aiSum.keyWeakness) {
          html += '<div style="display:flex;gap:1rem;margin-bottom:0.75rem;flex-wrap:wrap">';
          if (aiSum.keyStrength) html += '<span style="font-size:0.82rem"><span style="color:var(--green);font-weight:600">+ Strength:</span> ' + esc(aiSum.keyStrength) + '</span>';
          if (aiSum.keyWeakness) html += '<span style="font-size:0.82rem"><span style="color:var(--red);font-weight:600">- Weakness:</span> ' + esc(aiSum.keyWeakness) + '</span>';
          html += '</div>';
        }
      }

      // Detachment rules panel
      if (detRules) {
        html += '<details class="det-rules-panel"><summary>Detachment Rules &amp; Stratagems</summary>';
        // Detachment ability
        html += '<div class="det-ability-box"><strong>' + esc(detRules.abilityName) + '</strong><br>' + esc(detRules.abilityDesc) + '</div>';
        // Stratagems table
        if (detRules.stratagems.length > 0) {
          html += '<h3>Stratagems</h3>';
          html += '<table class="strat-table"><thead><tr><th>Stratagem</th><th>CP</th><th>Type</th></tr></thead><tbody>';
          detRules.stratagems.forEach(function(s) {
            html += '<tr><td>' + esc(s.name) + '</td><td class="strat-cp">' + esc(s.cp) + '</td><td class="strat-type">' + esc(s.type) + '</td></tr>';
          });
          html += '</tbody></table>';
        }
        // Enhancements
        if (detRules.enhancements.length > 0) {
          html += '<h3>Enhancements</h3>';
          html += '<table class="strat-table"><thead><tr><th>Enhancement</th><th>Pts</th></tr></thead><tbody>';
          detRules.enhancements.forEach(function(e) {
            html += '<tr><td>' + esc(e.name) + '</td><td class="enh-pts">' + esc(e.pts) + '</td></tr>';
          });
          html += '</tbody></table>';
        }
        html += '</details>';
      }

      // Frequency table
      if (freq && freq.topUnits && freq.topUnits.length > 0) {
        html += '<h3>Unit Frequency</h3>';
        html += '<table class="freq-table"><thead><tr><th>Unit</th><th class="num">Lists</th><th class="num">%</th></tr></thead><tbody>';
        freq.topUnits.slice(0, 15).forEach(function(u) {
          html += '<tr><td>' + esc(u.name) + kwBadgesHTML(u.name, kwMap) + '</td><td class="num">' + u.count + '</td><td class="num">' + u.frequency + '%</td></tr>';
        });
        html += '</tbody></table>';
        if (freq.topEnhancements && freq.topEnhancements.length > 0) {
          html += '<h3>Enhancement Frequency</h3>';
          html += '<table class="freq-table"><thead><tr><th>Enhancement</th><th class="num">Lists</th><th class="num">%</th></tr></thead><tbody>';
          freq.topEnhancements.forEach(function(e) {
            html += '<tr><td>' + esc(e.name) + '</td><td class="num">' + e.count + '</td><td class="num">' + e.frequency + '%</td></tr>';
          });
          html += '</tbody></table>';
        }
      }

      // Variance
      if (vari && vari.variantChoices && vari.variantChoices.length > 0) {
        html += '<div class="variance-section"><h3>Contested Choices <span class="variance-note">(20&ndash;79% inclusion)</span></h3><ul>';
        vari.variantChoices.forEach(function(u) {
          html += '<li>' + esc(u.name) + ' &mdash; ' + u.count + 'x (' + u.frequency + '%)</li>';
        });
        html += '</ul></div>';
      }

      // Novelty
      if (novFlags.length > 0) {
        html += '<div class="novelty-section"><h3>New Tech <span class="novelty-badge">NEW</span></h3><ul>';
        novFlags.forEach(function(n) {
          html += '<li>[' + esc(n.type) + '] ' + esc(n.name) + '</li>';
        });
        html += '</ul></div>';
      }

      // List cards
      html += '<h3>Lists</h3><div>';
      detLists.forEach(function(l) { html += buildListCard(l, ai); });
      html += '</div>';

      html += '</section>';
    });

    el.innerHTML = html;
  }

  // ---------------------------------------------------------------------------
  // Build Advisor tab
  // ---------------------------------------------------------------------------
  function renderAdvisor(opt, ai, rules, enriched) {
    var el = document.getElementById('advisor-content');
    var detFreq = (opt && opt.detachmentFrequencyAnalysis) || [];
    if (detFreq.length === 0) {
      el.innerHTML = '<p class="notice">No detachment data available. Run the pipeline to generate data.</p>';
      return;
    }

    // Build detachment rules map from either enriched or raw rules
    var detRulesMap = {};
    if (enriched && enriched.detachments) {
      enriched.detachments.forEach(function(d) {
        detRulesMap[d.name.toLowerCase()] = d;
      });
    } else if (rules) {
      var parsed = parseDetachmentRules(rules);
      Object.keys(parsed).forEach(function(k) {
        detRulesMap[k] = {
          name: parsed[k].abilityName,
          abilityName: parsed[k].abilityName,
          abilityDescription: parsed[k].abilityDesc,
          stratagems: parsed[k].stratagems.map(function(s) { return { name: s.name, cp: s.cp, type: s.type, target: null, targetKeywords: [] }; }),
          enhancements: parsed[k].enhancements,
        };
      });
    }

    // Build keyword lookup
    var kwMap = buildKeywordLookup(rules);

    // Enriched units for unseen data
    var unseenUnits = (enriched && enriched.unseenUnits) || [];

    // AI detachment summaries
    var aiSummaries = {};
    if (ai && ai.detachmentSummaries) {
      ai.detachmentSummaries.forEach(function(ds) {
        aiSummaries[ds.detachment.toLowerCase()] = ds.summary;
      });
    }

    // Build selector
    var html = '<div class="advisor-controls">';
    html += '<label for="advisor-det-select">Select Detachment:</label>';
    html += '<select id="advisor-det-select" onchange="advisorSelectDet(this.value)">';
    html += '<option value="">— Choose a detachment —</option>';
    detFreq.forEach(function(df) {
      html += '<option value="' + esc(df.detachment) + '">' + esc(df.detachment) + ' (' + df.listCount + ' lists)</option>';
    });
    html += '</select>';
    html += '</div>';
    html += '<div id="advisor-detail"></div>';
    el.innerHTML = html;

    // Store data for use by advisorSelectDet
    _advisorData = { detFreq: detFreq, detRulesMap: detRulesMap, kwMap: kwMap, unseenUnits: unseenUnits, aiSummaries: aiSummaries };
  }

  function advisorSelectDet(detName) {
    var detail = document.getElementById('advisor-detail');
    if (!detName) { detail.innerHTML = ''; return; }
    var data = _advisorData;
    var df = null;
    for (var i = 0; i < data.detFreq.length; i++) {
      if (data.detFreq[i].detachment === detName) { df = data.detFreq[i]; break; }
    }
    if (!df) { detail.innerHTML = '<p class="advisor-empty">No data for this detachment.</p>'; return; }

    var html = '';

    // AI summary for this detachment
    var aiSum = data.aiSummaries[detName.toLowerCase()];
    if (aiSum) {
      html += '<div class="advisor-ai-summary"><strong>AI Summary:</strong> ' + esc(aiSum) + '</div>';
    }

    // Detachment ability
    var detRules = data.detRulesMap[detName.toLowerCase()];
    if (detRules) {
      html += '<div class="advisor-det-ability"><strong>' + esc(detRules.abilityName) + ':</strong> ' +
        esc((detRules.abilityDescription || '').substring(0, 300)) +
        ((detRules.abilityDescription || '').length > 300 ? '&hellip;' : '') + '</div>';
    }

    // Tier the units
    var core = [], strong = [], tech = [];
    df.topUnits.forEach(function(u) {
      if (u.frequency >= 80) core.push(u);
      else if (u.frequency >= 40) strong.push(u);
      else tech.push(u);
    });

    // Find unseen units relevant to this detachment (units in rules never in any tournament list)
    var seenNames = {};
    df.topUnits.forEach(function(u) { seenNames[u.name.toLowerCase()] = true; });
    var unseen = data.unseenUnits.filter(function(u) { return !seenNames[u.name.toLowerCase()]; });

    // Render helper
    function renderTier(title, badgeClass, units, isUnseen) {
      if (units.length === 0) return '';
      var h = '<div class="advisor-tier"><h3><span class="tier-badge ' + badgeClass + '">' + title + '</span>';
      h += ' <span style="color:var(--text2);font-size:0.78rem">' + units.length + ' unit' + (units.length !== 1 ? 's' : '') + '</span></h3>';
      units.forEach(function(u) {
        h += '<div class="advisor-unit-card">';
        h += '<div><span class="advisor-unit-name">' + esc(u.name) + '</span>';
        h += kwBadgesHTML(u.name, data.kwMap);
        if (!isUnseen) {
          h += '<div class="advisor-unit-meta">' + u.count + 'x appearances &middot; ' + u.frequency + '% inclusion</div>';
        } else if (u.keywords && u.keywords.length > 0) {
          h += '<div class="advisor-unit-meta">Keywords: ' + u.keywords.join(', ') + '</div>';
        }
        // Show relevant stratagems (match unit keywords to stratagem target keywords)
        if (detRules && detRules.stratagems && !isUnseen) {
          var unitKws = data.kwMap[u.name.toLowerCase()] || [];
          var relevantStrats = [];
          detRules.stratagems.forEach(function(s) {
            if (!s.targetKeywords || s.targetKeywords.length === 0) {
              // Generic stratagem — always relevant
              relevantStrats.push(s);
            } else {
              for (var k = 0; k < s.targetKeywords.length; k++) {
                if (unitKws.indexOf(s.targetKeywords[k]) !== -1) {
                  relevantStrats.push(s);
                  break;
                }
              }
            }
          });
          if (relevantStrats.length > 0 && relevantStrats.length < detRules.stratagems.length) {
            h += '<div class="advisor-unit-strats"><strong>Key Stratagems:</strong> ';
            h += relevantStrats.map(function(s) { return esc(s.name) + ' (' + esc(s.cp) + ')'; }).join(', ');
            h += '</div>';
          }
        }
        h += '</div></div>';
      });
      h += '</div>';
      return h;
    }

    html += renderTier('CORE (&ge;80%)', 'tier-core', core, false);
    html += renderTier('STRONG (40\u201379%)', 'tier-strong', strong, false);
    html += renderTier('TECH (&lt;40%)', 'tier-tech', tech, false);
    html += renderTier('UNEXPLORED', 'tier-unseen', unseen.slice(0, 15), true);

    // Enhancements for this detachment
    if (detRules && detRules.enhancements && detRules.enhancements.length > 0) {
      html += '<div class="advisor-tier"><h3><span class="tier-badge tier-strong">ENHANCEMENTS</span></h3>';
      detRules.enhancements.forEach(function(e) {
        html += '<div class="advisor-unit-card"><span class="advisor-unit-name">' + esc(e.name) + '</span>';
        html += '<span class="enh-pts">' + e.pts + 'pts</span></div>';
      });
      html += '</div>';
    }

    // Stratagems table
    if (detRules && detRules.stratagems && detRules.stratagems.length > 0) {
      html += '<div class="advisor-tier"><h3><span class="tier-badge tier-strong">STRATAGEMS</span></h3>';
      html += '<table class="strat-table"><thead><tr><th>Stratagem</th><th>CP</th><th>Type</th></tr></thead><tbody>';
      detRules.stratagems.forEach(function(s) {
        html += '<tr><td>' + esc(s.name) + '</td><td class="strat-cp">' + esc(s.cp) + '</td><td class="strat-type">' + esc(s.type) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    detail.innerHTML = html;
  }

  // ---------------------------------------------------------------------------
  // Patterns tab
  // ---------------------------------------------------------------------------
  function renderPatterns(ai, opt) {
    var el = document.getElementById('patterns-content');
    var html = '';

    // AI cross-detachment patterns
    if (ai && !ai.skipped && ai.crossDetachmentPatterns) {
      html += '<section><h2>Cross-Detachment Patterns</h2><p class="prose-block">' + esc(ai.crossDetachmentPatterns) + '</p></section>';
    }

    // AI crawl diff
    if (ai && !ai.skipped && ai.crawlDiff) {
      html += '<section><h2>Since Last Crawl</h2><p class="prose-block">' + esc(ai.crawlDiff) + '</p></section>';
    }

    // Co-occurrence pairs from optimizer
    var coOcc = (opt && opt.coOccurrence) || [];
    if (coOcc.length > 0) {
      html += '<section><h2>Top Unit Pairings</h2>' +
        '<p style="color:var(--text2);font-size:0.83rem;margin-bottom:0.6rem">Units that appear together most frequently across tournament lists.</p>' +
        '<table class="freq-table"><thead><tr><th>Pairing</th><th class="num">Lists</th><th class="num">%</th></tr></thead><tbody>';
      coOcc.forEach(function(c) {
        html += '<tr><td>' + esc(c.pair) + '</td><td class="num">' + c.count + '</td><td class="num">' + c.frequency + '%</td></tr>';
      });
      html += '</tbody></table></section>';
    }

    // Validation warnings from optimizer
    var valWarnings = (opt && opt.validationWarnings) || [];
    if (valWarnings.length > 0) {
      html += '<section><h2>Data Quality Warnings</h2>' +
        '<p style="color:var(--text2);font-size:0.83rem;margin-bottom:0.6rem">Potential mismatches between list enhancements and declared detachments.</p>' +
        '<table class="freq-table"><thead><tr><th>Player</th><th>Enhancement</th><th>Declared</th><th>Expected</th></tr></thead><tbody>';
      valWarnings.forEach(function(w) {
        if (w.type === 'enhancement-detachment-mismatch') {
          html += '<tr><td>' + esc(w.player) + '</td><td>' + esc(w.enhancement) + '</td>' +
            '<td>' + esc(w.declaredDetachment) + '</td><td>' + esc(w.expectedDetachment) + '</td></tr>';
        }
      });
      html += '</tbody></table></section>';
    }

    if (!html) {
      html = '<p class="notice">No pattern data available yet.</p>';
    }
    el.innerHTML = html;
  }

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------
  var _rules   = null;

  var _enriched = null;

  function boot(meta, opt, ai, listsData, rules, enriched) {
    _meta     = meta;
    _ai       = ai;
    _rules    = rules || null;
    _enriched = enriched || null;

    // Header
    var faction = (meta && meta.meta && meta.meta.faction) || '—';
    document.getElementById('faction-badge').textContent = faction;
    document.title = 'Listhammer — ' + faction + ' Meta';
    var ts = meta && meta.meta && (meta.meta.generatedAt || meta.meta.crawledAt);
    if (ts) {
      document.getElementById('ts-badge').textContent = 'Updated ' + new Date(ts).toLocaleDateString();
    }

    // Flatten lists
    var lists = [];
    if (listsData) {
      lists = flattenFromLists(listsData);
    } else if (meta && meta.listsByDetachment) {
      Object.values(meta.listsByDetachment).forEach(function(arr) {
        arr.forEach(function(l) { lists.push(l); });
      });
    }

    renderDiffBanner(meta, ai);
    renderLists(lists, meta, ai);
    renderByDetachment(lists, ai, opt, rules);
    renderPatterns(ai, opt);
    renderAdvisor(opt, ai, rules, enriched);
  }

  // ---------------------------------------------------------------------------
  // Inline or fetch
  // ---------------------------------------------------------------------------
  if (INLINE_META || INLINE_OPT || INLINE_AI || INLINE_LISTS) {
    boot(INLINE_META, INLINE_OPT, INLINE_AI, INLINE_LISTS, INLINE_RULES, INLINE_ENRICHED);
  } else {
    function loadJSON(url) {
      var ctrl = new AbortController();
      var timer = setTimeout(function() { ctrl.abort(); }, 15000);
      return fetch(url, { signal: ctrl.signal })
        .then(function(r) { clearTimeout(timer); if (!r.ok) throw new Error(r.status); return r.json(); })
        .catch(function(err) { clearTimeout(timer); throw err; });
    }
    Promise.allSettled([
      loadJSON('data/meta-report.json'),
      loadJSON('data/optimizer.json'),
      loadJSON('data/ai-analysis.json'),
      loadJSON('data/army-lists.json'),
      loadJSON('data/rules.json'),
      loadJSON('data/enriched-rules.json'),
    ]).then(function(results) {
      var meta      = results[0].status === 'fulfilled' ? results[0].value : null;
      var opt       = results[1].status === 'fulfilled' ? results[1].value : null;
      var ai        = results[2].status === 'fulfilled' ? results[2].value : null;
      var listsData = results[3].status === 'fulfilled' ? results[3].value : null;
      var rules     = results[4].status === 'fulfilled' ? results[4].value : null;
      var enriched  = results[5].status === 'fulfilled' ? results[5].value : null;
      if (meta || opt || ai || listsData) {
        boot(meta, opt, ai, listsData, rules, enriched);
      } else {
        document.querySelector('.container').innerHTML =
          '<p class="notice">No data available. Run the GitHub Actions workflow to generate data.</p>';
      }
    });
  }
</script>
</body>
</html>
