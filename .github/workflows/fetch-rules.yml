name: Fetch Death Guard Rules

on:
  # Every Saturday at 05:00 UTC — runs the day before the Sunday army-list crawl
  # so fresh rules are always available for AI analysis.
  schedule:
    - cron: '0 5 * * 6'
  # Manual trigger with optional --force flag
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch even if rules are fresh'
        required: false
        type: boolean
        default: false

concurrency:
  group: fetch-rules
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch-rules:
    name: Fetch & commit Death Guard rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Fetch Death Guard rules from wahapedia.ru
        run: |
          ARGS="--faction death-guard --edition 10ed --delay 2000"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          node rules-fetcher.js $ARGS
        timeout-minutes: 45

      - name: Post-process rules (filter, deduplicate, regenerate TXT)
        run: node parse-rules.js --faction death-guard --edition 10ed

      - name: Upload rules debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rules-debug
          path: rules/debug-*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated rules (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          if git diff --cached --quiet; then
            echo "Rules unchanged — nothing to commit."
          else
            git commit -m "chore: refresh Death Guard rules [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
