name: Crawl, Analyse & Deploy

on:
  # Weekly crawl: every Sunday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 0'
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      game:
        description: 'Game system to crawl (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - '40k'
          - 'aos'

# Only one deploy at a time
concurrency:
  group: crawl-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    name: Crawl, Analyse & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Crawl listhammer.info
        run: node crawler.js --game 40k --faction "Death Guard" --delay 2000
        timeout-minutes: 30

      - name: Upload crawler debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-debug
          path: output/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload crawler debug artifacts (on success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-debug
          path: output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate meta report
        run: node report.js --format json
        timeout-minutes: 5

      - name: Run army optimizer
        run: node optimizer.js --format json
        timeout-minutes: 5

      - name: Generate AI meta analysis
        # Requires ANTHROPIC_API_KEY to be set as a repository secret.
        # If the secret is not set the step produces an empty placeholder
        # and the pipeline continues normally.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node ai-analysis.js
        timeout-minutes: 15

      - name: Build site
        run: node build-site.js
        timeout-minutes: 5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
